<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김지민 복귀 축하 🎉</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 별과 반짝임 배경 -->
    <div class="stars" id="stars"></div>

    <div class="container">
        <!-- 떠다니는 축하 이모지 -->
        <div class="floating-emojis" id="floatingEmojis"></div>

        <!-- 메인 콘텐츠 -->
        <div class="main-content">
            <div class="welcome-card">
                <div class="card-header">
                    <p class="eyebrow">기다리고 기다렸던 그 순간</p>
                    <h1 class="title">
                        <span class="title-line">WELCOME</span>
                        <span class="title-line title-back">BACK</span>
                    </h1>
                </div>

                <div class="card-body">
                    <div class="message">
                        <h2 class="name">김지민</h2>
                        <h3 class="return-message">복귀를 진심으로 축하합니다! 🎊</h3>
                    </div>

                    <div class="celebration-icons">
                        <span class="icon">🎉</span>
                        <span class="icon">🥳</span>
                        <span class="icon">🎊</span>
                        <span class="icon">🎈</span>
                        <span class="icon">✨</span>
                    </div>

                    <div class="wishes">
                        <p>그동안 정말 고생 많으셨어요.</p>
                        <p>다시 돌아온 당신을 두 팔 벌려 환영합니다!</p>
                        <p>앞으로의 날들도 늘 빛나기를 바라요 💙</p>
                    </div>

                    <button class="celebrate-btn" id="celebrateBtn">🎆 축포 터뜨리기 🎆</button>
                </div>

                <div class="card-footer">
                    <div class="heart-animation">
                        <span class="heart">💙</span>
                        <span class="heart">💜</span>
                        <span class="heart">💙</span>
                    </div>
                    <p class="signature">— 당신의 복귀를 기다린 모두가 —</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 폭죽 캔버스 -->
    <canvas id="fireworks"></canvas>

    <script src="script.js"></script>
</body>
</html>
